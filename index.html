<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AIAURA Sales Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0c1e3c;
    --navy-mid: #152d52;
    --navy-card: #1a3460;
    --navy-hover: #1e3d70;
    --teal: #3bbfad;
    --teal-dark: #2a9d8e;
    --teal-glow: rgba(59,191,173,0.18);
    --text-primary: #f0f5ff;
    --text-secondary: #8ba4c8;
    --text-muted: #4e6a90;
    --border: rgba(255,255,255,0.08);
    --border-teal: rgba(59,191,173,0.3);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html, body { height: 100%; background: var(--navy); color: var(--text-primary); font-family: var(--font); font-size: 14px; line-height: 1.5; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--navy); } ::-webkit-scrollbar-thumb { background: var(--navy-card); border-radius: 3px; }

  /* LOGIN */
  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--navy); }
  .login-card { width: 100%; max-width: 380px; background: var(--navy-mid); border: 1px solid var(--border-teal); border-radius: 20px; padding: 2.5rem; }
  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo .brand { font-size: 32px; font-weight: 600; letter-spacing: 0.15em; color: #fff; }
  .login-logo .tagline { font-size: 10px; letter-spacing: 0.25em; color: var(--teal); text-transform: uppercase; margin-top: 4px; }
  .login-prompt { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 1.5rem; }
  .staff-btn { display: flex; align-items: center; gap: 12px; width: 100%; margin-bottom: 10px; padding: 13px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: left; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ffffff; transition: all 0.18s ease; font-family: var(--font); }
  .staff-btn:hover { background: rgba(59,191,173,0.15); border-color: var(--teal); color: #ffffff; transform: translateX(3px); }
  .staff-btn .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--navy-card); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--teal); flex-shrink: 0; }
  .staff-btn.dir { border-color: rgba(59,191,173,0.4); }
  .staff-btn.dir .avatar { background: rgba(59,191,173,0.15); color: var(--teal); }
  .pin-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 18px; text-align: center; letter-spacing: 0.4em; font-family: var(--mono); margin: 1rem 0; }
  .pin-input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(59,191,173,0.12); }
  .btn-primary { width: 100%; padding: 12px; background: var(--teal); border: none; border-radius: 10px; color: var(--navy); font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); letter-spacing: 0.03em; transition: all 0.15s; }
  .btn-primary:hover { background: #4dcfbd; transform: translateY(-1px); }
  .err-msg { font-size: 12px; color: #f09595; text-align: center; margin-top: 8px; }
  .back-link { display: block; text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 14px; cursor: pointer; transition: color 0.15s; }
  .back-link:hover { color: var(--text-secondary); }

  /* APP LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--navy-mid); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 50; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-brand { font-size: 18px; font-weight: 600; letter-spacing: 0.1em; color: #fff; }
  .topbar-sub { font-size: 10px; letter-spacing: 0.18em; color: var(--text-muted); text-transform: uppercase; margin-top: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .badge-admin { font-size: 11px; background: rgba(59,191,173,0.15); color: var(--teal); border: 1px solid rgba(59,191,173,0.35); border-radius: 20px; padding: 4px 12px; font-weight: 500; }
  .badge-user { font-size: 11px; background: rgba(255,255,255,0.08); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 12px; font-weight: 500; }
  .signout-btn { font-size: 12px; color: var(--text-muted); background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 12px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .signout-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.3); }

  .content { flex: 1; padding: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 1rem; }
  .metric { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; transition: all 0.15s; cursor: pointer; user-select: none; }
  .metric:hover { border-color: var(--border-teal); background: var(--navy-card); }
  .metric.active { border-color: var(--teal); background: var(--navy-card); }
  .metric-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .metric-value { font-size: 26px; font-weight: 500; color: var(--text-primary); }
  .metric-value.teal { color: var(--teal); }
  .metric-value.amber { color: #fac775; }
  .metric-value.blue { color: #74b9ff; }
  .metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .metric-hint { font-size: 10px; color: rgba(59,191,173,0.5); margin-top: 6px; }

  /* QUICK VIEW PANEL */
  .qv-panel { background: var(--navy-card); border: 1px solid var(--border-teal); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; animation: fadeSlide 0.18s ease; }
  @keyframes fadeSlide { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .qv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .qv-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .qv-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; padding: 0 4px; line-height: 1; }
  .qv-close:hover { color: var(--text-primary); }
  .qv-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .qv-item:last-child { border-bottom: none; }
  .qv-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--navy-mid); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--teal); flex-shrink: 0; }
  .qv-main { flex: 1; min-width: 0; }
  .qv-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .qv-detail { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .qv-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .qv-right { text-align: right; flex-shrink: 0; }
  .qv-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 1.5rem 0; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.75rem; overflow-x: auto; }
  .tab-btn { font-size: 13px; font-weight: 500; padding: 10px 18px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; white-space: nowrap; font-family: var(--font); transition: color 0.15s; }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active { color: var(--teal); border-bottom: 2px solid var(--teal); }
  .tab-badge { display: inline-flex; align-items: center; justify-content: center; background: #ff7675; color: #fff; font-size: 10px; border-radius: 10px; padding: 1px 6px; margin-left: 6px; font-weight: 600; }

  /* SECTION HEADER */
  .sec-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .sec-title { font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .action-btn { font-size: 13px; padding: 7px 16px; border-radius: 8px; background: rgba(59,191,173,0.1); border: 1px solid rgba(59,191,173,0.35); color: var(--teal); cursor: pointer; font-family: var(--font); font-weight: 500; transition: all 0.15s; }
  .action-btn:hover { background: rgba(59,191,173,0.2); color: #fff; border-color: var(--teal); }
  .rem-btn { background: rgba(116,185,255,0.08); border-color: rgba(116,185,255,0.3); color: #74b9ff; }
  .rem-btn:hover { background: rgba(116,185,255,0.18); color: #fff; border-color: #74b9ff; }

  /* FILTER PILLS */
  .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .pill { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); cursor: pointer; background: none; color: var(--text-secondary); font-family: var(--font); transition: all 0.15s; }
  .pill:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }
  .pill.active { background: var(--teal); color: var(--navy); border-color: var(--teal); font-weight: 600; }

  /* TABLE */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
  thead th { text-align: left; font-size: 10px; font-weight: 600; color: var(--text-muted); padding: 12px 14px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; background: var(--navy-mid); }
  thead th:first-child { border-radius: 14px 0 0 0; }
  thead th:last-child { border-radius: 0 14px 0 0; }
  tbody td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-primary); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { background: var(--navy-mid); transition: background 0.12s; }
  tbody tr:hover { background: var(--navy-hover); }
  tbody tr:hover td { color: #ffffff; }

  /* BADGES */
  .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .b-starter { background: rgba(59,191,173,0.15); color: #3bbfad; }
  .b-professional { background: rgba(162,155,254,0.18); color: #b2acfe; }
  .b-unlimited { background: rgba(77,232,212,0.15); color: #4de8d4; }
  .b-founding { background: rgba(250,199,117,0.15); color: #fac775; }
  .b-new { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.55); }
  .b-upsell { background: rgba(59,191,173,0.12); color: #3bbfad; }
  .b-agency { background: rgba(250,199,117,0.12); color: #fac775; }
  .b-employer { background: rgba(240,149,123,0.14); color: #f0957b; }
  .s-contacted { background: rgba(116,185,255,0.14); color: #74b9ff; }
  .s-demo { background: rgba(250,199,117,0.14); color: #fac775; }
  .s-converted { background: rgba(59,191,173,0.16); color: #3bbfad; }
  .s-lost { background: rgba(255,118,117,0.14); color: #ff7675; }
  .pt-linka { background: rgba(116,185,255,0.15); color: #74b9ff; font-size: 10px; padding: 2px 7px; border-radius: 12px; font-weight: 600; display: inline-block; margin: 1px; }
  .pt-aiaura { background: rgba(59,191,173,0.15); color: #3bbfad; font-size: 10px; padding: 2px 7px; border-radius: 12px; font-weight: 600; display: inline-block; margin: 1px; }
  .pt-prodicta { background: rgba(162,155,254,0.18); color: #a29bfe; font-size: 10px; padding: 2px 7px; border-radius: 12px; font-weight: 600; display: inline-block; margin: 1px; }
  .pt-firelynx { background: rgba(255,118,117,0.15); color: #ff7675; font-size: 10px; padding: 2px 7px; border-radius: 12px; font-weight: 600; display: inline-block; margin: 1px; }

  /* ICON BUTTONS */
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px 7px; border-radius: 6px; color: var(--text-muted); transition: all 0.15s; font-family: var(--font); }
  .icon-btn:hover { color: var(--teal); background: rgba(59,191,173,0.1); }
  .icon-btn.danger:hover { color: #f09595; background: rgba(240,149,149,0.1); }

  /* ACTIVITY PANEL */
  .activity-panel { margin-top: 8px; }
  .activity-section { margin-bottom: 10px; }
  .activity-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; font-weight: 500; }
  .demo-card { background: rgba(250,199,117,0.06); border: 1px solid rgba(250,199,117,0.2); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .demo-card.done-card { opacity: 0.5; border-color: rgba(59,191,173,0.2); background: rgba(59,191,173,0.04); }
  .demo-card.cancelled-card { opacity: 0.4; border-color: rgba(255,118,117,0.2); background: rgba(255,118,117,0.04); text-decoration: line-through; }
  .demo-dt { font-size: 12px; font-weight: 600; color: #fac775; margin-bottom: 2px; }
  .demo-note-text { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
  .demo-note-text strong { color: var(--text-primary); font-weight: 500; }
  .demo-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .demo-action-btn { font-size: 11px; padding: 3px 10px; border-radius: 6px; border: 1px solid; cursor: pointer; font-family: var(--font); transition: all 0.15s; background: none; }
  .demo-action-btn.done-btn { border-color: rgba(59,191,173,0.35); color: #3bbfad; }
  .demo-action-btn.done-btn:hover { background: rgba(59,191,173,0.15); }
  .demo-action-btn.reschedule-btn { border-color: rgba(116,185,255,0.35); color: #74b9ff; }
  .demo-action-btn.reschedule-btn:hover { background: rgba(116,185,255,0.15); }
  .demo-action-btn.cancel-btn { border-color: rgba(255,118,117,0.3); color: #ff7675; }
  .demo-action-btn.cancel-btn:hover { background: rgba(255,118,117,0.1); }

  /* DEMO NOTE FORM */
  .demo-note-form { margin-top: 8px; display: flex; gap: 6px; }
  .demo-note-form textarea { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 6px 8px; color: #fff; font-size: 12px; resize: none; height: 44px; font-family: var(--font); }
  .demo-note-form textarea::placeholder { color: var(--text-muted); }
  .demo-note-form textarea:focus { outline: none; border-color: rgba(250,199,117,0.4); }
  .demo-note-form button { background: rgba(250,199,117,0.1); border: 1px solid rgba(250,199,117,0.3); border-radius: 6px; color: #fac775; font-size: 11px; cursor: pointer; padding: 0 10px; white-space: nowrap; font-family: var(--font); }
  .demo-note-form button:hover { background: rgba(250,199,117,0.2); }

  .rem-card { background: rgba(116,185,255,0.05); border: 1px solid rgba(116,185,255,0.2); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 10px; }
  .rem-card.done-rem { opacity: 0.4; }
  .rem-dt { font-size: 12px; font-weight: 600; color: #74b9ff; margin-bottom: 2px; }
  .rem-txt { font-size: 12px; color: var(--text-secondary); }
  .rem-done-btn { background: none; border: 1px solid rgba(59,191,173,0.3); border-radius: 6px; color: #3bbfad; font-size: 10px; cursor: pointer; padding: 3px 8px; white-space: nowrap; font-family: var(--font); flex-shrink: 0; }
  .rem-done-btn:hover { background: rgba(59,191,173,0.12); }

  .note-card { border-left: 2px solid rgba(59,191,173,0.35); padding-left: 10px; margin-bottom: 8px; }
  .note-ts { font-size: 10px; color: var(--text-muted); font-family: var(--mono); margin-bottom: 2px; }
  .note-txt { font-size: 12px; color: var(--text-secondary); }

  .note-add-form { display: flex; gap: 6px; margin-top: 8px; }
  .note-add-form textarea { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 7px 10px; color: #fff; font-size: 12px; resize: none; height: 48px; font-family: var(--font); }
  .note-add-form textarea::placeholder { color: var(--text-muted); }
  .note-add-form textarea:focus { outline: none; border-color: var(--border-teal); }
  .note-add-form button { background: rgba(59,191,173,0.1); border: 1px solid rgba(59,191,173,0.35); border-radius: 6px; color: var(--teal); font-size: 11px; cursor: pointer; padding: 0 12px; white-space: nowrap; font-family: var(--font); }
  .note-add-form button:hover { background: rgba(59,191,173,0.22); color: #fff; }

  .toggle-expand { font-size: 11px; color: rgba(59,191,173,0.6); cursor: pointer; background: none; border: none; font-family: var(--font); padding: 0; margin-top: 4px; display: block; }
  .toggle-expand:hover { color: var(--teal); }

  /* ALERTS */
  .alert-card { display: flex; align-items: flex-start; gap: 12px; background: var(--navy-mid); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; border-left: 3px solid; }
  .alert-card.overdue { border-color: #ff7675; }
  .alert-card.demo-soon { border-color: #fac775; }
  .alert-card.reminder { border-color: #74b9ff; }
  .alert-card.demo-contact { border-color: #3bbfad; background: rgba(59,191,173,0.05); }
  .alert-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .alert-body { flex: 1; }
  .alert-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; }
  .alert-sub { font-size: 12px; color: var(--text-secondary); }
  .alert-dismiss { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 0 4px; flex-shrink: 0; transition: color 0.15s; }
  .alert-dismiss:hover { color: var(--text-secondary); }

  /* LEADERBOARD */
  .lb-card { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; transition: border-color 0.15s; }
  .lb-card:hover { border-color: var(--border-teal); }
  .lb-rank { font-size: 16px; font-weight: 600; color: var(--text-muted); width: 24px; flex-shrink: 0; }
  .lb-rank.gold { color: var(--teal); }
  .lb-name { flex: 1; font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .lb-leads { font-size: 12px; color: var(--text-muted); }
  .lb-comm { font-size: 15px; font-weight: 600; color: var(--teal); }
  .lb-bar-wrap { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; width: 120px; }
  .lb-bar { height: 3px; background: var(--teal); border-radius: 2px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-start; justify-content: center; padding-top: 2rem; z-index: 200; backdrop-filter: blur(3px); }
  .modal { background: var(--navy-mid); border: 1px solid var(--border-teal); border-radius: 18px; padding: 2rem; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 18px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.5rem; }
  .form-field { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; font-weight: 500; }
  .form-field select, .form-field input[type=date], .form-field input[type=datetime-local], .form-field input[type=text], .form-field textarea { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); border-radius: 10px; padding: 10px 14px; color: #fff; font-size: 14px; font-family: var(--font); transition: border-color 0.15s; }
  .form-field select:focus, .form-field input:focus, .form-field textarea:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(59,191,173,0.1); }
  .form-field select option { background: #1a3460; }
  .form-field textarea { resize: vertical; min-height: 72px; }
  .form-field textarea::placeholder, .form-field input::placeholder { color: var(--text-muted); }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .pchk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pchk { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: all 0.15s; }

// Get AIAURA rates for a specific staff member
function getAIAURARate(staff){return COMM_RATES.AIAURA[staff]||null;}

// Calculate AIAURA commission — MRR plans: % × monthly price × months. ACV plans: % × monthly price × 12
function calcAIAURAComm(staff,plan,customPrice){
  const rates=getAIAURARate(staff);if(!rates)return 0;
  const p=rates.plans[plan];if(!p)return 0;
  const price=customPrice?parseFloat(customPrice):p.price||0;
  const months=p.isACV?12:p.commMonths;
  return Math.round(price*(p.commPct/100)*months*100)/100;
}

  return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

  if(S.user==='Ricky'||S.user==='Katherine'||S.isAdmin){

      if(!S.dismissedAlerts[ra.key]){
        if(ra.isAccelerator&&!S.isAdmin)return; // accelerator flags admin only
        alerts.push({key:ra.key,type:ra.isAccelerator?'demo-contact':'overdue',icon:ra.isAccelerator?'🚀':'🔄',title:ra.isAccelerator?ra.msg:`Demo rescheduled — ${ra.company}`,sub:ra.isAccelerator?'AIAURA accelerator — check commission boost':`${ra.staff} rescheduled to ${fmtDt(ra.newDt)}`,leadId:ra.leadId});
      }
    });
  }
  myLeads().forEach(l=>{
    const k1=`fu-${l.id}`;
    if(!S.dismissedAlerts[k1]&&l.status!=='Converted'&&l.status!=='Lost'&&daysSince(l.date)>=4)
      alerts.push({key:k1,type:'overdue',icon:'⏰',title:`Follow up needed`,sub:`${S.isAdmin?l.staff+' · ':''}${l.products.join(', ')} — no update for ${daysSince(l.date)} days`,leadId:l.id});
    (l.demos||[]).forEach(d=>{
      if(d.status==='upcoming'){
        const k=`demo-${d.id}`;
        // 48hr heads up
        if(!S.dismissedAlerts[k]&&isSoon(d.dt))
          alerts.push({key:k,type:'demo-soon',icon:'📅',title:'Demo coming up soon',sub:`${S.isAdmin?l.staff+' · ':''}${fmtDt(d.dt)}${d.note?' — '+d.note:''}`,leadId:l.id});
        // Same-day client contact reminder
        const ck=`demo-contact-${d.id}`;
        if(!S.dismissedAlerts[ck]&&isToday(d.dt))
          alerts.push({key:ck,type:'demo-contact',icon:'📞',title:`Contact ${l.company||l.contactName||'client'} — demo today`,sub:`${S.isAdmin?l.staff+' · ':''}Remind them of their demo at ${new Date(d.dt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}${l.contactPhone?' · '+l.contactPhone:''}${l.contactEmail?' · '+l.contactEmail:''}`,leadId:l.id});
        // Tomorrow reminder
        const tk=`demo-tomorrow-${d.id}`;
        if(!S.dismissedAlerts[tk]&&isTomorrow(d.dt))
          alerts.push({key:tk,type:'demo-soon',icon:'📋',title:`Demo tomorrow — ${l.company||l.contactName||'client'}`,sub:`${S.isAdmin?l.staff+' · ':''}${fmtDt(d.dt)} — consider sending a confirmation`,leadId:l.id});
      }
    });
    (l.reminders||[]).forEach(r=>{
      if(!r.done){const k=`rem-${r.id}`;if(!S.dismissedAlerts[k]&&new Date(r.dt)<=new Date(Date.now()+172800000))alerts.push({key:k,type:'reminder',icon:'🔔',title:'Manual reminder due',sub:`${S.isAdmin?l.staff+' · ':''}${r.txt} — ${fmtDt(r.dt)}`,leadId:l.id,remId:r.id});}
    });
  });
  return alerts;
}

    else items=cv.map(l=>`<div class="qv-item">
      <div class="qv-avatar" style="background:rgba(59,191,173,0.15);color:#3bbfad">${(l.company||l.contactName||'?')[0].toUpperCase()}</div>

        <div class="qv-main">
          <div class="qv-name">${u.company||u.contactName||'Unknown'}</div>
          <div class="qv-detail">${u.what||'—'}</div>
          <div class="qv-meta">${u.date}${S.isAdmin?' · '+u.staff:''}</div>
        </div>
        <div class="qv-right"><span style="font-size:14px;font-weight:600;color:#3bbfad">${u.commission?'£'+u.commission:'—'}</span></div>

      <div class="qv-right"><button class="rem-done-btn" data-markdone="${r.id}" data-lid="${l.id}">Done</button></div>
    </div>`).join('');
  }

  return`<div class="qv-panel">
    <div class="qv-header">

function alertsTab(alerts,ml){
  const now=new Date();
  const todayStr=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});

  // TODAY'S DEMOS
  const todayDemos=ml.flatMap(l=>(l.demos||[]).filter(d=>d.status==='upcoming'&&isToday(d.dt)).map(d=>({l,d}))).sort((a,b)=>new Date(a.d.dt)-new Date(b.d.dt));

  // TODAY'S REMINDERS (due today)
  const todayRems=ml.flatMap(l=>(l.reminders||[]).filter(r=>!r.done&&isToday(r.dt)).map(r=>({l,r}))).sort((a,b)=>new Date(a.r.dt)-new Date(b.r.dt));

  // FOLLOW-UPS DUE TODAY (leads with no contact for 4+ days, not converted/lost)
  const followUps=ml.filter(l=>l.status!=='Converted'&&l.status!=='Lost'&&daysSince(l.date)>=4);

  // UPCOMING DEMOS (not today)
  const upcomingDemos=ml.flatMap(l=>(l.demos||[]).filter(d=>d.status==='upcoming'&&!isToday(d.dt)).map(d=>({l,d}))).sort((a,b)=>new Date(a.d.dt)-new Date(b.d.dt));

  // UPCOMING REMINDERS (not today, not done)
  const upcomingRems=ml.flatMap(l=>(l.reminders||[]).filter(r=>!r.done&&!isToday(r.dt)).map(r=>({l,r}))).sort((a,b)=>new Date(a.r.dt)-new Date(b.r.dt));

  // OTHER ALERTS (reschedule etc)
  const otherAlerts=alerts.filter(a=>a.type!=='overdue'&&a.type!=='demo-contact'&&a.type!=='demo-tomorrow');

  const hasAnythingToday=todayDemos.length>0||todayRems.length>0||followUps.length>0;

  // Build encoded payload for mark-all-done
  const allTodayIds=JSON.stringify({
    demoIds:todayDemos.map(({l,d})=>({lid:l.id,did:d.id})),

    </div>

    ${todayDemos.length>0?`

          </div>

            <button class="rem-done-btn" data-markdone="${r.id}" data-lid="${l.id}">Done</button>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}

    <!-- FOLLOW-UPS DUE -->

function calendarTab(){
  const STAFF_COLORS={Ricky:'#3bbfad',Katherine:'#a29bfe',Ramsey:'#fac775',Jessie:'#74b9ff'};
  const HOURS=Array.from({length:14},(_,i)=>i+7); // 7am–8pm
  const today=new Date();today.setHours(0,0,0,0);
  const weekStart=new Date(today);
  const dayOfWeek=weekStart.getDay();
  const mondayOffset=dayOfWeek===0?-6:1-dayOfWeek;
  weekStart.setDate(weekStart.getDate()+mondayOffset+S.calWeekOffset*7);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d;});
  const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Gather all events for this week
  function sameLocalDay(dt,day){
    return dt.getFullYear()===day.getFullYear()&&dt.getMonth()===day.getMonth()&&dt.getDate()===day.getDate();
  }

  function eventsForDay(day){
    const evts=[];
    // Demos from all leads — use local date comparison
    S.leads.forEach(l=>{
      (l.demos||[]).filter(d=>d.status==='upcoming').forEach(d=>{
        const dt=new Date(d.dt);
        if(sameLocalDay(dt,day)){
          evts.push({type:'demo',start:dt,durationMins:60,label:`${l.company||l.contactName||'Demo'} — ${l.staff}`,staff:l.staff,color:STAFF_COLORS[l.staff]||'#fac775'});
        }
      });
    });
    // Busy blocks
    S.busyBlocks.forEach(b=>{
      const bs=new Date(b.start);const be=new Date(b.end);

        evts.push({type:'busy',subtype:b.type,start:bs,durationMins:Math.round((be-bs)/60000),label:`${b.staff}: ${b.label}`,staff:b.staff,id:b.id,color:STAFF_COLORS[b.staff]||'#fff'});

    const height=Math.max(evt.durationMins/60*48-2,20);
    return`top:${top}px;height:${Math.min(height,(20-clampedStart)*48)}px;`;
  }

  const weekLabel=`${days[0].toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;

        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(255,118,117,0.15);border-left:3px solid #ff7675"></div>Busy</div>

function signupModal(){
  const l=S.signupLeadId?S.leads.find(x=>x.id===S.signupLeadId):null;
  const prod=S._signupProd||'PRODICTA';
  const isAIAURA=prod==='AIAURA';
  const isLinka=prod==='Linka';
  const staffForRates=S.isAdmin?(S._signupStaff||'Ricky'):S.user;
  const aiRates=isAIAURA?getAIAURARate(staffForRates):null;
  const linkaRates=isLinka?COMM_RATES.Linka:null;
  const prodPlans=isAIAURA?aiRates?.plans:isLinka?null:COMM_RATES[prod]?.plans;
  const plan=S._signupPlan||(prodPlans?Object.keys(prodPlans)[0]:'');
  const customPrice=S._signupCustomPrice||'';
  const selectedAddons=S._signupAddons||[];
  const linkaUsage=parseFloat(S._linkaUsage||0);

  // Calculate commission
  let bonus=0,addonTotal=0;
  if(isLinka){
    // Linka: 10% of first month usage spend (activation month)
    bonus=Math.round(linkaUsage*0.1*100)/100;
  } else if(isAIAURA&&aiRates&&plan){
    bonus=calcAIAURAComm(staffForRates,plan,customPrice?parseFloat(customPrice):null);
    if(aiRates?.addonsDetailed) addonTotal=selectedAddons.reduce((a,k)=>a+(aiRates.addonsDetailed[k]||0),0);
    else if(aiRates?.addons?.perAddon) addonTotal=selectedAddons.length*aiRates.addons.perAddon;
  } else if(prodPlans&&plan){
    bonus=prodPlans[plan]?.signup||0;
  }
  const totalBonus=Math.round((bonus+addonTotal)*100)/100;
  const planData=prodPlans?.[plan];
  const needsCustomPrice=isAIAURA&&planData?.customPrice;
  const residualPct=isLinka?linkaRates?.baseRate:isAIAURA?(aiRates?.residualPct||5):(COMM_RATES[prod]?.recurringPct||0);

  return`<div class="modal-overlay"><div class="modal">
    <h3>Log sign-up & commission</h3>
    ${l?`<div style="font-size:13px;color:var(--text-secondary);margin-bottom:1.25rem;font-weight:500">${l.company||l.contactName||'Client'}</div>`:S._linkaClientName?`<div style="font-size:13px;color:var(--text-secondary);margin-bottom:1.25rem;font-weight:500">${S._linkaClientName}</div>`:''}

    </select></div>`:''}
    <div class="form-field"><label class="form-label">Product signed up to</label><select id="sgprod">
      ${PRODUCTS.filter(p=>{
        const staff=S.isAdmin?(S._signupStaff||staffForRates):S.user;
        if(p==='Firelynx')return true; // all staff
        return PRODICTA_AIAURA_STAFF.includes(staff); // PRODICTA/AIAURA/Linka — Ricky & Katherine only
      }).map(p=>`<option ${p===prod?'selected':''}>${p}</option>`).join('')}
    </select></div>
    ${isLinka?`
    <div style="background:rgba(116,185,255,0.08);border:1px solid rgba(116,185,255,0.2);border-radius:8px;padding:12px 14px;margin-bottom:1rem;font-size:12px;color:var(--text-secondary)">
      Linka is usage-based — commission is 10% of the client's actual monthly spend. Log the activation now, then add monthly usage spend each month to calculate commission.
    </div>
    <div class="form-field"><label class="form-label">First month usage spend (£) <span style="color:var(--text-muted);font-size:10px">(optional — enter 0 if not yet known)</span></label>
      <input type="text" id="sglinkaUsage" placeholder="e.g. 450" value="${S._linkaUsage||''}"/>
    </div>`
    :prodPlans?`<div class="form-field"><label class="form-label">Plan</label><select id="sgplan">
      ${Object.entries(prodPlans).map(([p,v])=>`<option value="${p}" ${p===plan?'selected':''}>${p}${v.price&&!v.customPrice?' — £'+v.price+'/mo':v.customPrice?' — custom pricing':''}</option>`).join('')}
    </select></div>`:`<div class="form-field"><label class="form-label">Plan</label><input type="text" id="sgplan" placeholder="Plan name"/></div>`}
    ${needsCustomPrice?`<div class="form-field"><label class="form-label">Monthly price (£) <span style="color:var(--text-muted);font-size:10px">— custom pricing</span></label><input type="text" id="sgcustomprice" placeholder="e.g. 2500" value="${customPrice}"/></div>`:''}
    ${isAIAURA&&aiRates?.addonsDetailed?`<div class="form-field"><label class="form-label">Add-ons sold <span style="color:var(--text-muted);font-size:10px">(optional)</span></label>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${Object.entries(aiRates.addonsDetailed).map(([name,amt])=>`<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-primary)"><input type="checkbox" class="sgaddon" data-addon="${name}" ${selectedAddons.includes(name)?'checked':''} style="accent-color:#3bbfad;width:14px;height:14px"/> ${name} <span style="color:#3bbfad">+£${amt}</span></label>`).join('')}
      </div></div>`
    :isAIAURA&&aiRates?.addons?.perAddon?`<div class="form-field"><label class="form-label">Add-ons sold <span style="color:var(--text-muted);font-size:10px">£${aiRates.addons.perAddon} each</span></label>
      <input type="number" id="sgaddoncount" min="0" value="${selectedAddons.length||0}" style="width:120px"/>
    </div>`:''}
    <div style="background:rgba(59,191,173,0.08);border:1px solid rgba(59,191,173,0.25);border-radius:8px;padding:12px 14px;margin-bottom:1rem">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">Commission breakdown</div>
      ${isLinka?`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">10% of £${linkaUsage.toFixed(2)} usage = £${bonus.toFixed(2)}</div><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Accelerator tiers: 12% at £3k+ / 15% at £5k+ monthly revenue</div>`:''}
      ${isAIAURA&&planData?`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">${planData.commPct}% × ${planData.isACV?'12 months ACV':planData.commMonths+' months MRR'} = £${bonus.toFixed(2)} <span style="color:var(--text-muted)">(paid quarterly)</span></div><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Then 5% monthly residual from month ${planData.isACV?13:planData.commMonths+1}</div>`:''}
      ${addonTotal>0?`<div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">Add-ons: +£${addonTotal}</div>`:''}
      <div style="font-size:22px;font-weight:600;color:#3bbfad">£${totalBonus.toFixed(2)}</div>
      ${!isAIAURA?`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">${isLinka?'+ 10% of each month\'s usage for 12 months':prod==='Firelynx'?'One-off payment — no recurring commission':'+ '+residualPct+'% recurring from month 2 (paid monthly, up to 12 months)'}</div>`:''}
    </div>

    <!-- CHECKLIST -->
    <div style="background:var(--navy-mid);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:1rem">
      <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px">Before logging — confirm all complete</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${isLinka?`
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text-primary)">
          <input type="checkbox" id="chk1" style="accent-color:#3bbfad;width:16px;height:16px"/>
          Direct Debit set up
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text-primary)">
          <input type="checkbox" id="chk2" style="accent-color:#3bbfad;width:16px;height:16px"/>
          Agreement signed
        </label>
        `:`
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text-primary)">
          <input type="checkbox" id="chk1" style="accent-color:#3bbfad;width:16px;height:16px"/>
          First payment received
        </label>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text-primary)">
          <input type="checkbox" id="chk2" style="accent-color:#3bbfad;width:16px;height:16px"/>
          Agreement signed
        </label>
        `}
      </div>
      ${S._signupChkErr?`<p style="font-size:12px;color:#f09595;margin-top:10px">${S._signupChkErr}</p>`:''}
    </div>

    <div class="form-field"><label class="form-label">Client onboarding start date</label><input type="date" id="sgdate" value="${new Date().toISOString().slice(0,10)}"/></div>
    <div class="modal-actions"><button class="btn-cancel" id="sgcm">Cancel</button><button class="btn-save" id="sgsv">Log sign-up</button></div>
  </div></div>`;}

    <div class="form-field"><label class="form-label">Account type</label><select id="mac">

function bind(){
  document.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>{
    const n=b.dataset.n;
    if(n==='__admin__'){S.loginStep='pin';S.loginErr='';r();}
    else{S.loginStep='staffpin';S._pendingUser=n;S.loginErr='';r();}
  });
  const pg=document.getElementById('pgo');
  if(pg)pg.onclick=()=>{
    const val=document.getElementById('pin').value;
    if(S.loginStep==='staffpin'){
      if(val===STAFF_PINS[S._pendingUser]){S.loggedIn=true;S.isAdmin=false;S.user=S._pendingUser;loadAll();}
      else{S.loginErr='Incorrect PIN — try again.';r();}
    } else {
      if(val===PIN){S.loggedIn=true;S.isAdmin=true;S.user='Jessie';loadAll();}
      else{S.loginErr='Incorrect PIN — try again.';r();}
    }
  };
  // Allow Enter key on PIN input
  const pi=document.getElementById('pin');if(pi)pi.onkeydown=(e)=>{if(e.key==='Enter')pg?.click();};
  const bk=document.getElementById('bk');if(bk)bk.onclick=()=>{S.loginStep='choose';r();};
  const lo=document.getElementById('lo');if(lo)lo.onclick=()=>{S.loggedIn=false;S.loginStep='choose';S.isAdmin=false;S.user=null;r();};
  const om=document.getElementById('om');if(om)om.onclick=()=>{S.showModal=true;S.editId=null;S.mProds=[];S.mErr='';S._mSnap={};r()};
  const cm=document.getElementById('cm');if(cm)cm.onclick=()=>{S.showModal=false;S._mSnap={};r();};

  document.querySelectorAll('.mpt').forEach(el=>el.onclick=()=>{
    // Snapshot all text fields before re-render so they survive
    const snap=(id)=>{const el=document.getElementById(id);return el?el.value:'';};
    S._mSnap={ms:snap('ms'),mco:snap('mco'),mcn:snap('mcn'),mem:snap('mem'),mph:snap('mph'),mac:snap('mac'),mst:snap('mst'),mdt:snap('mdt')};
    const p=el.dataset.p;S.mProds=S.mProds.includes(p)?S.mProds.filter(x=>x!==p):[...S.mProds,p];S.mErr='';r();
  });
  const sv=document.getElementById('sv');
  if(sv)sv.onclick=async()=>{
    if(S.mProds.length===0){S.mErr='Select at least one product.';r();return;}
    const st=S.isAdmin?document.getElementById('ms').value:S.user;
    const payload={staff:st,company:document.getElementById('mco').value.trim(),contact_name:document.getElementById('mcn').value.trim(),contact_email:document.getElementById('mem').value.trim(),contact_phone:document.getElementById('mph').value.trim(),account:document.getElementById('mac').value,products:S.mProds,status:document.getElementById('mst').value,date:document.getElementById('mdt').value};
    if(S.editId!==null){await dbPatch('tracker_leads',S.editId,payload);}
    else{await dbPost('tracker_leads',payload);}
    S.showModal=false;S._mSnap={};await loadAll();};
  document.querySelectorAll('[data-qv]').forEach(b=>b.onclick=()=>{
    S.qv=S.qv===b.dataset.qv?null:b.dataset.qv;r();});
  document.querySelectorAll('[data-qvclose]').forEach(b=>b.onclick=()=>{S.qv=null;r();});
  document.querySelectorAll('[data-tab]').forEach(t=>t.onclick=()=>{S.tab=t.dataset.tab;r();});
  document.querySelectorAll('[data-f]').forEach(f=>f.onclick=()=>{S.filter=f.dataset.f;r();});
  document.querySelectorAll('[data-del]').forEach(d=>d.onclick=async()=>{await dbDelete('tracker_leads',d.dataset.del);await loadAll();});
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const l=S.leads.find(x=>x.id===b.dataset.edit);if(!l)return;S.showModal=true;S.editId=l.id;S.mProds=[...l.products];S.mErr='';r();});
  document.querySelectorAll('[data-exp]').forEach(b=>b.onclick=()=>{const id=b.dataset.exp;S.expanded[id]=!S.expanded[id];r();});
  document.querySelectorAll('[data-ni]').forEach(ta=>ta.oninput=()=>{S.noteInputs[ta.dataset.ni]=ta.value;});
  document.querySelectorAll('[data-dni]').forEach(ta=>ta.oninput=()=>{S.demoNoteInputs[ta.dataset.dni]=ta.value;});
  document.querySelectorAll('[data-nadd]').forEach(btn=>btn.onclick=async()=>{
    const id=btn.dataset.nadd;const txt=(S.noteInputs[`n-${id}`]||'').trim();if(!txt)return;
    await dbPost('tracker_notes',{lead_id:id,ts:nowTs(),txt});
    S.noteInputs[`n-${id}`]='';await loadAll();});
  document.querySelectorAll('[data-dnadd]').forEach(btn=>btn.onclick=async()=>{
    const did2=btn.dataset.dnadd;const lid=btn.dataset.lid;const key=did2+'-'+lid;
    const txt=(S.demoNoteInputs[key]||'').trim();if(!txt)return;
    const l=S.leads.find(x=>x.id===lid);const d=l&&l.demos.find(x=>x.id===did2);
    if(d){
      const newNotes=[...(d.demoNotes||[]),{ts:nowTs(),txt}];
      await dbPatch('tracker_demos',did2,{demo_notes:newNotes});
      await dbPost('tracker_notes',{lead_id:lid,ts:nowTs(),txt:`Demo note: ${txt}`});
    }
    S.demoNoteInputs[key]='';await loadAll();});
  document.querySelectorAll('[data-od]').forEach(b=>b.onclick=()=>{S.showDemoModal=true;S.demoLeadId=b.dataset.od;S.rescheduleId=null;r();});
  document.querySelectorAll('[data-or]').forEach(b=>b.onclick=()=>{S.showReminderModal=true;S.reminderLeadId=b.dataset.or;r();});
  const dcm=document.getElementById('dcm');if(dcm)dcm.onclick=()=>{S.showDemoModal=false;S.rescheduleId=null;r();};
  const dsv=document.getElementById('dsv');
  if(dsv)dsv.onclick=async()=>{
    const l=S.leads.find(x=>x.id===S.demoLeadId);if(!l)return;
    const dt=document.getElementById('ddt').value;const note=document.getElementById('dnote').value.trim();
    if(S.rescheduleId){
      await dbPatch('tracker_demos',S.rescheduleId,{status:'rescheduled'});
      await dbPost('tracker_demos',{lead_id:l.id,dt,note:note||'Rescheduled demo',demo_prods:l.products,demo_notes:[],status:'upcoming'});
      await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:`Demo rescheduled to ${fmtDt(dt)}`});
      S.rescheduleAlerts=[...S.rescheduleAlerts,{key:`resch-${Date.now()}`,company:l.company||l.contactName||'client',newDt:dt,staff:l.staff,leadId:l.id}];
    }else{
      await dbPost('tracker_demos',{lead_id:l.id,dt,note,demo_prods:l.products,demo_notes:[],status:'upcoming'});
      await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:`Demo booked: ${fmtDt(dt)}`});
    }
    S.showDemoModal=false;S.rescheduleId=null;await loadAll();};
  document.querySelectorAll('[data-demodone]').forEach(b=>b.onclick=async()=>{
    const l=S.leads.find(x=>x.id===b.dataset.lid);
    if(l){await dbPatch('tracker_demos',b.dataset.demodone,{status:'done'});await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:'Demo completed ✓'});}
    await loadAll();});
  document.querySelectorAll('[data-resch]').forEach(b=>b.onclick=()=>{
    const l=S.leads.find(x=>x.id===b.dataset.lid);
    const d=l&&l.demos.find(x=>x.id===b.dataset.resch);
    S.reschOldDt=d?d.dt:'';S.showDemoModal=true;S.demoLeadId=b.dataset.lid;S.rescheduleId=b.dataset.resch;r();});
  document.querySelectorAll('[data-canceldemo]').forEach(b=>b.onclick=async()=>{
    const l=S.leads.find(x=>x.id===b.dataset.lid);
    if(l){await dbPatch('tracker_demos',b.dataset.canceldemo,{status:'cancelled'});await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:'Demo cancelled.'});}
    await loadAll();});
  const rcm=document.getElementById('rcm');if(rcm)rcm.onclick=()=>{S.showReminderModal=false;r();};
  const rsv=document.getElementById('rsv');
  if(rsv)rsv.onclick=async()=>{
    const l=S.leads.find(x=>x.id===S.reminderLeadId);if(!l)return;
    const dt=document.getElementById('rdt').value;const txt=document.getElementById('rnote').value.trim();if(!txt||!dt)return;
    await dbPost('tracker_reminders',{lead_id:l.id,dt,txt,done:false});
    await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:`Reminder set: ${fmtDt(dt)} — ${txt}`});
    S.showReminderModal=false;await loadAll();};
  document.querySelectorAll('[data-markalldone]').forEach(b=>b.onclick=async()=>{
    const payload=JSON.parse(b.dataset.markalldone);const ts=nowTs();
    await Promise.all([
      ...payload.demoIds.map(({lid,did})=>Promise.all([dbPatch('tracker_demos',did,{status:'done'}),dbPost('tracker_notes',{lead_id:lid,ts,txt:'Demo completed ✓ — marked all done for today.'})])),
      ...payload.remIds.map(({lid,rid})=>Promise.all([dbPatch('tracker_reminders',rid,{done:true}),dbPost('tracker_notes',{lead_id:lid,ts,txt:'Reminder done — marked all done for today.'})])),
      ...payload.followUpIds.map(lid=>Promise.all([dbPatch('tracker_leads',lid,{date:new Date().toISOString().slice(0,10)}),dbPost('tracker_notes',{lead_id:lid,ts,txt:'Follow-up completed — contact reset. Marked all done for today.'})]))
    ]);
    await loadAll();});
  document.querySelectorAll('[data-followupdone]').forEach(b=>b.onclick=async()=>{
    const lid=b.dataset.followupdone;
    await dbPatch('tracker_leads',lid,{date:new Date().toISOString().slice(0,10)});
    await dbPost('tracker_notes',{lead_id:lid,ts:nowTs(),txt:'Follow-up completed — contact reset.'});
    await loadAll();});
  document.querySelectorAll('[data-markdone]').forEach(b=>b.onclick=async()=>{
    const l=S.leads.find(x=>x.id===b.dataset.lid);
    if(l){const rem=l.reminders.find(x=>x.id===b.dataset.markdone);if(rem){await dbPatch('tracker_reminders',rem.id,{done:true});await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:`Reminder done: ${rem.txt}`});}}
    await loadAll();});
  document.querySelectorAll('[data-dismiss]').forEach(b=>b.onclick=()=>{S.dismissedAlerts[b.dataset.dismiss]=true;r();});
  document.querySelectorAll('[data-setstatus]').forEach(b=>b.onclick=async()=>{
    const l=S.leads.find(x=>x.id===b.dataset.lid);if(!l)return;
    const newStatus=b.dataset.setstatus;if(l.status===newStatus)return;
    const old=l.status;
    await dbPatch('tracker_leads',l.id,{status:newStatus});
    await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:`Status changed: ${old} → ${newStatus}`});
    let openSignup=false,signupLeadId=null,signupProd='',signupPlan='',signupStaff='';
    if(newStatus==='Demo booked'){S.showDemoModal=true;S.demoLeadId=l.id;S.rescheduleId=null;}
    if(newStatus==='Converted'&&COMM_STAFF.includes(l.staff)){
      const leadProd=l.products&&l.products[0]||'PRODICTA';
      const validProd=l.staff==='Ramsey'?'Firelynx':((['PRODICTA','AIAURA','Linka'].includes(leadProd)&&PRODICTA_AIAURA_STAFF.includes(l.staff))||leadProd==='Firelynx')?leadProd:'PRODICTA';
      let firstPlan='';
      if(validProd==='AIAURA'){const aiR=getAIAURARate(l.staff);firstPlan=Object.keys(aiR?.plans||{})[0]||'';}
      else{firstPlan=Object.keys(COMM_RATES[validProd]?.plans||{})[0]||'';}
      openSignup=true;signupLeadId=l.id;signupProd=validProd;signupPlan=firstPlan;signupStaff=l.staff;
    }
    await loadAll();
    if(openSignup){
      S.showSignupModal=true;S.signupLeadId=signupLeadId;S._signupProd=signupProd;
      S._signupPlan=signupPlan;S._signupAddons=[];S._signupCustomPrice='';
      S._signupStaff=signupStaff;S._signupChkErr='';r();
    }});
  document.querySelectorAll('[data-editdemoprods]').forEach(b=>b.onclick=()=>{
    const key=b.dataset.editdemoprods+'-'+b.dataset.lid;
    const l=S.leads.find(x=>x.id===b.dataset.lid);
    const d=l&&l.demos.find(x=>x.id===b.dataset.editdemoprods);
    S.editDemoProdsKey=key;S.demoProdsSel=[...(d&&d.demoProds&&d.demoProds.length?d.demoProds:l?l.products:[])];S.demoProdErr='';r();});
  document.querySelectorAll('.dpt').forEach(el=>el.onclick=()=>{
    const p=el.dataset.p;S.demoProdsSel=S.demoProdsSel.includes(p)?S.demoProdsSel.filter(x=>x!==p):[...S.demoProdsSel,p];S.demoProdErr='';r();});
  document.querySelectorAll('[data-savedp]').forEach(b=>b.onclick=async()=>{
    if(!S.demoProdsSel.length){S.demoProdErr='Select at least one product.';r();return;}
    const l=S.leads.find(x=>x.id===b.dataset.lid);
    if(l){const d=l.demos.find(x=>x.id===b.dataset.savedp);if(d){const old=(d.demoProds||[]).join(', ');await dbPatch('tracker_demos',d.id,{demo_prods:S.demoProdsSel});await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:`Demo products updated: ${old} → ${S.demoProdsSel.join(', ')}`});}}
    S.editDemoProdsKey=null;S.demoProdsSel=[];await loadAll();});
  document.querySelectorAll('[data-canceldp]').forEach(b=>b.onclick=()=>{S.editDemoProdsKey=null;S.demoProdsSel=[];r();});

  // Commission tab
  document.querySelectorAll('[data-cf]').forEach(f=>f.onclick=()=>{S.commFilter=f.dataset.cf;r();});
  const ologsignup=document.getElementById('ologsignup');
  if(ologsignup)ologsignup.onclick=()=>{
    const defaultStaff=COMM_STAFF.includes(S.user)?S.user:'Ricky';
    const defaultProd=defaultStaff==='Ramsey'?'Firelynx':'PRODICTA';
    const defaultPlan=Object.keys(COMM_RATES[defaultProd]?.plans||{})[0]||'';
    S.showSignupModal=true;S.signupLeadId=null;S._signupProd=defaultProd;S._signupPlan=defaultPlan;S._signupAddons=[];S._signupCustomPrice='';S._linkaUsage='';S._signupStaff=defaultStaff;S._signupChkErr='';r();};
  const sgcm=document.getElementById('sgcm');if(sgcm)sgcm.onclick=()=>{S.showSignupModal=false;S._signupAddons=[];S._signupChkErr='';r();};
  // Staff change — reload plans for AIAURA
  const sgstaff=document.getElementById('sgstaff');
  if(sgstaff)sgstaff.onchange=()=>{
    S._signupStaff=sgstaff.value;
    // Ramsey can only do Firelynx
    if(sgstaff.value==='Ramsey'){S._signupProd='Firelynx';S._signupPlan=Object.keys(COMM_RATES.Firelynx.plans)[0];}
    else if(S._signupProd==='AIAURA'){const aiRates=getAIAURARate(sgstaff.value);S._signupPlan=Object.keys(aiRates?.plans||{})[0]||'';}
    S._signupAddons=[];S._signupCustomPrice='';r();};
  const sgprod=document.getElementById('sgprod');
  if(sgprod)sgprod.onchange=()=>{
    S._signupProd=sgprod.value;S._signupAddons=[];S._signupCustomPrice='';
    if(sgprod.value==='AIAURA'){const staff=S._signupStaff||(COMM_STAFF.includes(S.user)?S.user:'Ricky');const aiRates=getAIAURARate(staff);S._signupPlan=Object.keys(aiRates?.plans||{})[0]||'';}
    else{S._signupPlan=Object.keys(COMM_RATES[sgprod.value]?.plans||{})[0]||'';}
    r();};
  const sgplan=document.getElementById('sgplan');
  if(sgplan&&sgplan.tagName==='SELECT')sgplan.onchange=()=>{S._signupPlan=sgplan.value;S._signupCustomPrice='';r();};
  const sglu=document.getElementById('sglinkaUsage');
  if(sglu)sglu.oninput=()=>{S._linkaUsage=sglu.value;r();};
  document.querySelectorAll('.sgaddon').forEach(cb=>cb.onchange=()=>{
    const name=cb.dataset.addon;S._signupAddons=S._signupAddons||[];
    if(cb.checked)S._signupAddons=[...S._signupAddons,name];
    else S._signupAddons=S._signupAddons.filter(x=>x!==name);r();});
  // Katherine's per-addon count field
  const sgac=document.getElementById('sgaddoncount');
  if(sgac)sgac.oninput=()=>{
    const n=parseInt(sgac.value)||0;S._signupAddons=Array(n).fill('addon');r();};
  const sgsv=document.getElementById('sgsv');
  if(sgsv)sgsv.onclick=async()=>{
    // Validate checklist
    const chk1=document.getElementById('chk1');
    const chk2=document.getElementById('chk2');
    if(!chk1?.checked||!chk2?.checked){
      const prod2=document.getElementById('sgprod')?.value||'';
      const isLinka2=prod2==='Linka';
      S._signupChkErr=isLinka2?'Please confirm DD is set up and agreement is signed.':'Please confirm first payment received and agreement is signed.';
      r();return;
    }
    S._signupChkErr='';
    const l=S.signupLeadId?S.leads.find(x=>x.id===S.signupLeadId):null;
    const staff=S.isAdmin?(document.getElementById('sgstaff')?.value||S.user):S.user;
    const prod=document.getElementById('sgprod').value;
    const planEl=document.getElementById('sgplan');
    const plan=planEl?planEl.value:(prod==='Linka'?'Usage-based':'');
    const isAIAURA=prod==='AIAURA';
    const isLinka=prod==='Linka';
    const customPrice=document.getElementById('sgcustomprice')?.value||'';
    let bonus=0,addonTotal=0,residualPct=0;
    if(isLinka){
      const usage=parseFloat(document.getElementById('sglinkaUsage')?.value||0);
      bonus=Math.round(usage*0.1*100)/100;
      residualPct=10; // 10% of monthly usage ongoing
    } else if(isAIAURA){
      const aiRates=getAIAURARate(staff);
      bonus=calcAIAURAComm(staff,plan,customPrice?parseFloat(customPrice):null);
      residualPct=aiRates?.residualPct||5;
      if(aiRates?.addonsDetailed){const selAddons=S._signupAddons||[];addonTotal=selAddons.reduce((a,k)=>a+(aiRates.addonsDetailed[k]||0),0);}
      else if(aiRates?.addons?.perAddon){const cnt=parseInt(document.getElementById('sgaddoncount')?.value)||0;addonTotal=cnt*aiRates.addons.perAddon;}
    } else {
      const prodPlans=COMM_RATES[prod]?.plans;
      bonus=prodPlans?.[plan]?.signup||0;
      residualPct=COMM_RATES[prod]?.recurringPct||0;
    }
    const totalBonus=Math.round((bonus+addonTotal)*100)/100;
    const linkaClient=S._linkaClientName||'';
    const payload={staff,lead_id:l?l.id:null,company:l?l.company||l.contactName:linkaClient,contact_name:l?l.contactName:linkaClient,product:prod,plan,signup_bonus:totalBonus,recurring_pct:residualPct,recurring_active:false,recurring_months_paid:0,date:document.getElementById('sgdate').value};
    await dbPost('tracker_signups',payload);
    if(l)await dbPost('tracker_notes',{lead_id:l.id,ts:nowTs(),txt:`Sign-up logged: ${prod}${plan&&plan!=='Usage-based'?' '+plan:''} — £${totalBonus} commission`});
    // Accelerator check for AIAURA
    if(prod==='AIAURA'&&S.isAdmin){
      const now2=new Date();const thisMonth2=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;
      const staffCount=(S.signups||[]).filter(sg=>sg.staff===staff&&sg.product==='AIAURA'&&(sg.date||'').startsWith(thisMonth2)).length+1;
      const accel=COMM_RATES.AIAURA[staff]?.accelerators;
      if(accel&&staffCount>=accel.deals5Month.threshold){
        S.rescheduleAlerts=[...S.rescheduleAlerts,{key:`acc-${staff}-${Date.now()}`,isAccelerator:true,staff,msg:`${staff} has closed ${staffCount} AIAURA deals this month — +${accel.deals5Month.boostPct}% commission boost applies!`}];
      }
    }
    S.showSignupModal=false;S._signupAddons=[];S._signupCustomPrice='';S._linkaUsage='';S._linkaClientName='';await loadAll();};
  document.querySelectorAll('[data-linkaexp]').forEach(b=>b.onclick=()=>{
    const key=`linka-${b.dataset.linkaexp}`;S.expanded[key]=!S.expanded[key];r();});
  document.querySelectorAll('[data-linkamonth]').forEach(b=>b.onclick=()=>{
    const clientName=b.dataset.linkamonth;
    const existing=S.signups.find(sg=>sg.product==='Linka'&&(sg.company||sg.contactName)===clientName);
    S.showSignupModal=true;S.signupLeadId=existing?.leadId||null;
    S._signupProd='Linka';S._signupPlan='Usage-based';
    S._signupStaff=existing?.staff||S.user;
    S._signupAddons=[];S._signupCustomPrice='';S._linkaUsage='';
    S._linkaClientName=clientName;r();});
  document.querySelectorAll('[data-cancelclient]').forEach(b=>b.onclick=async()=>{
    if(!confirm('Mark this client as cancelled? Commission will stop from this point.'))return;
    await dbPatch('tracker_signups',b.dataset.cancelclient,{client_cancelled:true,recurring_active:false});
    await loadAll();});
  document.querySelectorAll('[data-addresidualmonth]').forEach(b=>b.onclick=async()=>{
    const sg=S.signups.find(x=>x.id===b.dataset.addresidualmonth);if(!sg)return;
    const newMonth=(sg.recurringMonthsPaid||0)+1;
    await dbPatch('tracker_signups',sg.id,{recurring_months_paid:newMonth,recurring_active:newMonth<12});
    await loadAll();});
  document.querySelectorAll('[data-startrecurring]').forEach(b=>b.onclick=async()=>{
    await dbPatch('tracker_signups',b.dataset.startrecurring,{recurring_active:true,recurring_start_date:new Date().toISOString().slice(0,10)});
    await loadAll();});
  document.querySelectorAll('[data-delsg]').forEach(b=>b.onclick=async()=>{await dbDelete('tracker_signups',b.dataset.delsg);await loadAll();});
  // Award bonus
  document.querySelectorAll('[data-awardbtn]').forEach(b=>b.onclick=()=>{S.showAwardModal=true;S.awardStaff=b.dataset.awardbtn;r();});
  const abcm=document.getElementById('abcm');if(abcm)abcm.onclick=()=>{S.showAwardModal=false;r();};
  const absv=document.getElementById('absv');
  if(absv)absv.onclick=async()=>{
    const staff=document.getElementById('abstaff').value;
    const type=document.getElementById('abtype').value;
    const amount=parseFloat(document.getElementById('abamt').value)||0;
    const month=document.getElementById('abmonth').value;
    const note=document.getElementById('abnote').value.trim();
    await dbPost('tracker_bonuses',{staff,type,amount,month,note,date:new Date().toISOString().slice(0,10)});
    S.showAwardModal=false;await loadAll();};

  // Calendar
  document.querySelectorAll('[data-calweek]').forEach(b=>b.onclick=()=>{
    const v=parseInt(b.dataset.calweek);
    S.calWeekOffset=v===0?0:S.calWeekOffset+v;r();});
  const obusy=document.getElementById('obusy');
  if(obusy)obusy.onclick=()=>{S.showBusyModal=true;S.busyErr='';r();};
  const bcm=document.getElementById('bcm');if(bcm)bcm.onclick=()=>{S.showBusyModal=false;S.busyErr='';r();};
  const bsv=document.getElementById('bsv');
  if(bsv)bsv.onclick=async()=>{
    const staff=S.isAdmin?(document.getElementById('bstaff')?.value||S.user):S.user;
    const start=document.getElementById('bstart').value;
    const end=document.getElementById('bend').value;
    const type=document.getElementById('btype').value;
    const label=document.getElementById('blabel').value.trim()||type;
    if(!start||!end){S.busyErr='Please set a start and end time.';r();return;}
    if(new Date(end)<=new Date(start)){S.busyErr='End time must be after start time.';r();return;}
    await dbPost('tracker_busy_blocks',{staff,start_dt:start,end_dt:end,label,type});
    S.showBusyModal=false;S.busyErr='';await loadAll();};

  window.__delBusy=async(id)=>{await dbDelete('tracker_busy_blocks',id);await loadAll();};

  // Upsells
  document.querySelectorAll('[data-uf]').forEach(f=>f.onclick=()=>{S.upsellFilter=f.dataset.uf;r();});
  document.querySelectorAll('[data-delu]').forEach(b=>b.onclick=async()=>{await dbDelete('tracker_upsells',b.dataset.delu);await loadAll();});
  const oum=document.getElementById('oum');
  if(oum)oum.onclick=()=>{S.showUpsellModal=true;S.editUpsellId=null;S.upsellProds=[];S.upsellErr='';S.upsellPrefillLeadId=null;S.upsellSelectedLeadId=null;r();};
  document.querySelectorAll('[data-quickupsell]').forEach(b=>b.onclick=()=>{
    S.showUpsellModal=true;S.editUpsellId=null;S.upsellProds=[];S.upsellErr='';
    S.upsellPrefillLeadId=b.dataset.quickupsell;S.upsellSelectedLeadId=b.dataset.quickupsell;r();});
  document.querySelectorAll('.upt').forEach(el=>el.onclick=()=>{const p=el.dataset.p;S.upsellProds=S.upsellProds.includes(p)?S.upsellProds.filter(x=>x!==p):[...S.upsellProds,p];S.upsellErr='';r();});
  const ucm=document.getElementById('ucm');if(ucm)ucm.onclick=()=>{S.showUpsellModal=false;r();};
  const ulid=document.getElementById('ulid');
  if(ulid)ulid.onchange=()=>{
    const lid=ulid.value;S.upsellSelectedLeadId=lid||null;
    const l=lid?S.leads.find(x=>x.id===lid):null;
    if(l){const co=document.getElementById('uco');const cn=document.getElementById('ucn');if(co)co.value=l.company||'';if(cn)cn.value=l.contactName||'';}
  };
  const usv=document.getElementById('usv');
  if(usv)usv.onclick=async()=>{
    if(S.upsellProds.length===0){S.upsellErr='Select at least one product.';r();return;}
    const st=S.isAdmin?document.getElementById('ums')?.value||S.user:S.user;
    const leadId=document.getElementById('ulid')?.value||null;
    const commRaw=document.getElementById('ucomm').value.trim().replace('£','');
    const comm=commRaw?parseFloat(commRaw)||0:0;
    const payload={staff:st,lead_id:leadId||null,company:document.getElementById('uco').value.trim(),contact_name:document.getElementById('ucn').value.trim(),what:document.getElementById('uwhat').value.trim(),products:S.upsellProds,commission:comm,notes:document.getElementById('unotes').value.trim(),date:document.getElementById('udt').value};
    if(S.editUpsellId!==null){await dbPatch('tracker_upsells',S.editUpsellId,payload);}
    else{await dbPost('tracker_upsells',payload);}
    S.showUpsellModal=false;await loadAll();};
}
r();

</script>
</body>
</html>
